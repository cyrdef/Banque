<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Mensuel — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #F7F7F5; --surface: #FFFFFF; --surface2: #F0EFEB;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
    --text: #1A1A18; --text-muted: #6B6B67; --text-faint: #A8A8A4;
    --accent: #2C5F8A; --accent-light: #E8F0F8; --accent-text: #1A3F5C;
    --green: #1D7A4F; --green-light: #E6F5EE;
    --red: #B03A2E; --red-light: #FAEAE8;
    --radius: 10px; --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }

  /* TOAST */
  #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow-lg); min-width: 260px; max-width: 340px; pointer-events: auto; animation: toastIn 0.25s ease; transition: opacity 0.3s, transform 0.3s; }
  .toast.hide { opacity: 0; transform: translateX(20px); }
  .toast-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
  .toast-body { flex: 1; }
  .toast-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .toast-msg { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .toast-close { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 14px; padding: 0; flex-shrink: 0; line-height: 1; }
  .toast-close:hover { color: var(--text); }
  .toast.success .toast-icon { color: var(--green); }
  .toast.error   .toast-icon { color: var(--red); }
  .toast.info    .toast-icon { color: var(--accent); }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }
  .toast.info    { border-left: 3px solid var(--accent); }
  @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LAYOUT */
  .login-wrap { width: 100%; max-width: 400px; }
  .login-brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
  .login-brand i { font-size: 28px; color: var(--accent); }
  .login-brand span { font-size: 17px; font-weight: 600; color: var(--text); }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-lg); }
  .login-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

  /* FIELDS */
  .field { margin-bottom: 16px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .input-wrap { position: relative; }
  .input-wrap .input-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 16px; pointer-events: none; }
  .input-wrap input { width: 100%; padding: 10px 40px 10px 36px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; font-family: 'Inter', sans-serif; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(44,95,138,0.1); }
  .toggle-pw { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 15px; padding: 2px; line-height: 1; }
  .toggle-pw:hover { color: var(--text-muted); }

  .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: -10px; margin-bottom: 20px; cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; width: 100%; }
  .forgot-link:hover { text-decoration: underline; }

  .btn-login { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s; }
  .btn-login:hover { background: var(--accent-text); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .spinner-sm { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .btn-login.loading .spinner-sm { display: block; }
  .btn-login.loading .btn-text { display: none; }

  #view-reset { display: none; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; padding: 0; margin-bottom: 20px; }
  .back-link:hover { color: var(--accent); }
  .reset-info { background: var(--accent-light); border: 1px solid rgba(44,95,138,0.15); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--accent-text); margin-bottom: 20px; display: flex; gap: 8px; align-items: flex-start; }
  .footer-note { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<div id="toast-container"></div>

<div class="login-wrap">
  <div class="login-brand">
    <i class="ti ti-building-bank"></i>
    <span>Budget Mensuel</span>
  </div>

  <div class="login-card">

    <!-- VUE CONNEXION -->
    <div id="view-login">
      <div class="login-title">Bon retour &#128075;</div>
      <div class="login-sub">Connecte-toi pour acc&eacute;der &agrave; ton budget.</div>

      <div class="field">
        <label>Adresse e-mail</label>
        <div class="input-wrap">
          <i class="ti ti-mail input-icon"></i>
          <input type="email" id="login-email" placeholder="exemple@email.com" autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <i class="ti ti-lock input-icon"></i>
          <!-- CORRECTION : double id="login-password" supprimé -->
          <input type="password" id="login-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
          <button class="toggle-pw" id="togglePwBtn" type="button" tabindex="-1"><i class="ti ti-eye" id="togglePwIcon"></i></button>
        </div>
      </div>

      <button class="forgot-link" id="forgotBtn" type="button" style="text-align:right;">Mot de passe oubli&eacute; ?</button>

      <button class="btn-login" id="loginBtn" type="button">
        <div class="spinner-sm" id="loginSpinner"></div>
        <span class="btn-text" id="loginBtnText"><i class="ti ti-login"></i> Se connecter</span>
      </button>
    </div>

    <!-- VUE RESET -->
    <div id="view-reset">
      <button class="back-link" id="backBtn" type="button">
        <i class="ti ti-arrow-left"></i> Retour &agrave; la connexion
      </button>
      <div class="login-title">R&eacute;initialiser</div>
      <div class="login-sub">Entre ton e-mail, on t'envoie un lien.</div>
      <div class="reset-info">
        <i class="ti ti-info-circle" style="flex-shrink:0;margin-top:1px;"></i>
        <span>Un e-mail de r&eacute;initialisation sera envoy&eacute; &agrave; l'adresse indiqu&eacute;e si elle est associ&eacute;e &agrave; un compte.</span>
      </div>
      <div class="field">
        <label>Adresse e-mail</label>
        <div class="input-wrap">
          <i class="ti ti-mail input-icon"></i>
          <input type="email" id="reset-email" placeholder="exemple@email.com" autocomplete="email">
        </div>
      </div>
      <button class="btn-login" id="resetBtn" type="button">
        <div class="spinner-sm" id="resetSpinner"></div>
        <span class="btn-text" id="resetBtnText"><i class="ti ti-send"></i> Envoyer le lien</span>
      </button>
    </div>

  </div>
  <div class="footer-note">Budget Mensuel &middot; Acc&egrave;s s&eacute;curis&eacute;</div>
</div>

<!-- Firebase (classic scripts, pas de module, pour garder scope global) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
// CORRECTION : config alignée avec budget.js (banquecyrille-a9055)
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAflr5Pa_aujkFcSsJ43H8LiAw_vU51Ffw",
  authDomain:        "banquecyrille-a9055.firebaseapp.com",
  projectId:         "banquecyrille-a9055",
  storageBucket:     "banquecyrille-a9055.firebasestorage.app",
  messagingSenderId: "1083349423488",
  appId:             "1:1083349423488:web:1b7df80c5affbadeaadd65"
};

firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();

// Redirect si deja connecte
auth.onAuthStateChanged(function(user) {
  if (user) {
    toast('info', 'Deja connecte', 'Bienvenue ' + user.email);
    setTimeout(function() { window.location.href = 'index.html'; }, 800);
  }
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(type, title, msg) {
  msg = msg || '';
  var icons = { success: 'ti-circle-check', error: 'ti-alert-circle', info: 'ti-info-circle' };
  var container = document.getElementById('toast-container');
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML =
    '<i class="ti ' + (icons[type] || 'ti-info-circle') + ' toast-icon"></i>' +
    '<div class="toast-body">' +
      '<div class="toast-title">' + title + '</div>' +
      (msg ? '<div class="toast-msg">' + msg + '</div>' : '') +
    '</div>' +
    '<button class="toast-close" onclick="dismissToast(this.parentElement)"><i class="ti ti-x"></i></button>';
  container.appendChild(el);
  setTimeout(function() { dismissToast(el); }, 4500);
}

function dismissToast(el) {
  if (!el || !el.parentElement) return;
  el.classList.add('hide');
  setTimeout(function() { if (el.parentElement) el.remove(); }, 300);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  if (!email || !password) {
    toast('error', 'Champs manquants', 'Remplis l\'e-mail et le mot de passe.');
    return;
  }
  setLoading('loginBtn', 'loginSpinner', 'loginBtnText', true);
  auth.signInWithEmailAndPassword(email, password)
    .then(function(cred) {
      toast('success', 'Connexion reussie', 'Bienvenue ' + cred.user.email + ' !');
      setTimeout(function() { window.location.href = 'index.html'; }, 900);
    })
    .catch(function(e) {
      var msgs = {
        'auth/user-not-found': 'Aucun compte trouve pour cet e-mail.',
        'auth/wrong-password': 'Mot de passe incorrect.',
        'auth/invalid-email': 'Adresse e-mail invalide.',
        'auth/too-many-requests': 'Trop de tentatives. Reessaie plus tard.',
        'auth/user-disabled': 'Ce compte a ete desactive.',
        'auth/invalid-credential': 'Identifiants incorrects.'
      };
      toast('error', 'Erreur de connexion', msgs[e.code] || e.message);
      setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false);
    });
}

function doReset() {
  var email = document.getElementById('reset-email').value.trim();
  if (!email) {
    toast('error', 'E-mail requis', 'Entre ton adresse pour recevoir le lien.');
    return;
  }
  setLoading('resetBtn', 'resetSpinner', 'resetBtnText', true);
  auth.sendPasswordResetEmail(email)
    .then(function() {
      toast('success', 'E-mail envoye', 'Un lien de reinitialisation a ete envoye a ' + email + '.');
      setTimeout(function() { showLogin(); }, 1500);
      setLoading('resetBtn', 'resetSpinner', 'resetBtnText', false);
    })
    .catch(function(e) {
      var msgs = {
        'auth/user-not-found': 'Aucun compte associe a cet e-mail.',
        'auth/invalid-email': 'Adresse e-mail invalide.'
      };
      toast('error', 'Erreur', msgs[e.code] || e.message);
      setLoading('resetBtn', 'resetSpinner', 'resetBtnText', false);
    });
}

// ── UI ────────────────────────────────────────────────────────────────────────
function showReset() {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-reset').style.display = 'block';
  var email = document.getElementById('login-email').value.trim();
  if (email) document.getElementById('reset-email').value = email;
  document.getElementById('reset-email').focus();
}

function showLogin() {
  document.getElementById('view-reset').style.display = 'none';
  document.getElementById('view-login').style.display = 'block';
  document.getElementById('login-email').focus();
}

function togglePw() {
  var input = document.getElementById('login-password');
  var icon = document.getElementById('togglePwIcon');
  var isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  icon.className = isHidden ? 'ti ti-eye-off' : 'ti ti-eye';
}

function setLoading(btnId, spinnerId, textId, on) {
  var btn = document.getElementById(btnId);
  var spinner = document.getElementById(spinnerId);
  var text = document.getElementById(textId);
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  text.style.display = on ? 'none' : 'inline-flex';
}

// ── LISTENERS ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('resetBtn').addEventListener('click', doReset);
  document.getElementById('forgotBtn').addEventListener('click', showReset);
  document.getElementById('backBtn').addEventListener('click', showLogin);
  document.getElementById('togglePwBtn').addEventListener('click', togglePw);

  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('reset-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doReset();
  });
  document.getElementById('login-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });
});
</script>
</body>
</html>
